<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Parking Lot Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <h1>Parking Lot Management</h1>
    <div class="controls">
      <input id="carNo" placeholder="Enter car number" />
      <button id="parkBtn">Park Car</button>
      <button id="leaveBtn">Leave Car</button>
      <button id="refreshBtn">Refresh</button>
      <label class="small">Auto-refresh
        <input type="checkbox" id="autoRefresh" />
      </label>
      <label class="small">Interval
        <select id="refreshInterval">
          <option value="2000">2s</option>
          <option value="5000" selected>5s</option>
          <option value="10000">10s</option>
        </select>
      </label>
      <input id="searchCar" placeholder="Search car number" />
    </div>

    <div class="layout">
      <div class="lot" id="lot"></div>
      <div class="list">
        <h3>Currently Parked (by entry time)</h3>
        <ul id="parkedList"></ul>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
